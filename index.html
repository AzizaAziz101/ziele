<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily AI — Assistenten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface-h: #161616;
      --border:    rgba(255,255,255,0.09);
      --border-h:  rgba(255,255,255,0.15);
      --text:      #e4e4e4;
      --muted:     #5c5c5c;
      --muted-2:   #3a3a3a;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .hidden { display: none !important; }

    /* ─────────────────────────────
       HOME VIEW
    ───────────────────────────── */
    #viewHome {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .home-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
    }

    .home-logo {
      width: 28px; height: 28px;
      background: #e4e4e4;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #0a0a0a;
      letter-spacing: -.03em;
    }

    .home-title { font-size: 14px; font-weight: 500; color: var(--text); }

    .home-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .home-headline {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .home-h1 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -.03em;
      color: var(--text);
      text-align: center;
      line-height: 1.25;
      margin-bottom: 12px;
    }

    .home-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 52px;
    }

    .bot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 900px;
    }

    .bot-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 24px 24px;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      position: relative;
      overflow: hidden;
    }

    .bot-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
    }

    .bot-card:hover {
      background: var(--surface-h);
      border-color: var(--border-h);
      transform: translateY(-1px);
    }

    .card-icon {
      font-size: 20px;
      margin-bottom: 18px;
      color: var(--accent);
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.02em;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .card-traits {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
    }

    .trait {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .card-cta {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: -.01em;
    }

    /* ─────────────────────────────
       CHAT VIEW
    ───────────────────────────── */
    #viewChat {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 28px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); cursor: pointer;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px;
      background: none;
      transition: color .15s, border-color .15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--border-h); }

    .chat-bot-info {
      display: flex; align-items: center; gap: 10px;
    }

    .bot-badge {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }

    .chat-bot-name {
      font-size: 14px; font-weight: 600; letter-spacing: -.02em;
    }

    .chat-bot-tag {
      font-size: 11px; color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px;
      text-transform: uppercase; letter-spacing: .06em; font-weight: 500;
    }

    .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--muted);
    }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 32px 28px;
      display: flex; flex-direction: column; gap: 0;
      scrollbar-width: thin; scrollbar-color: #1e1e1e transparent;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 4px; }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px;
      gap: 10px;
    }
    .empty-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #fff;
      margin-bottom: 8px;
    }
    .empty-state h3 { font-size: 16px; font-weight: 600; letter-spacing: -.02em; }
    .empty-state p  { font-size: 13px; color: var(--muted); max-width: 320px; line-height: 1.6; }

    .starter-chips {
      display: flex; flex-wrap: wrap; gap: 7px;
      justify-content: center; margin-top: 12px;
    }
    .starter-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 13px;
      font-size: 12px; color: var(--muted); cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }
    .starter-chip:hover { color: var(--text); border-color: var(--border-h); background: var(--surface-h); }

    /* Message rows */
    .msg-row { display: flex; flex-direction: column; margin-bottom: 24px; animation: fadeUp .2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .msg-row.user { align-items: flex-end; }
    .msg-row.ai   { align-items: flex-start; }

    .msg-sender {
      font-size: 11px; font-weight: 500; color: var(--muted);
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 6px; padding: 0 4px;
    }

    .msg-bubble {
      max-width: 72%; padding: 11px 15px;
      border-radius: 8px; font-size: 14px; line-height: 1.75;
    }

    .msg-row.user .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-right-radius: 3px;
      color: var(--text);
    }

    .msg-row.ai .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      border-bottom-left-radius: 3px;
      color: var(--text);
    }

    .msg-bubble pre {
      background: rgba(0,0,0,.4); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px; margin: 10px 0;
      overflow-x: auto; font-size: 12px;
    }
    .msg-bubble pre code { font-family: 'JetBrains Mono','Fira Code',monospace; line-height: 1.6; }
    .msg-bubble code {
      font-family: 'JetBrains Mono','Fira Code',monospace;
      font-size: 12px; background: rgba(255,255,255,.06);
      padding: 1px 5px; border-radius: 4px;
    }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-bubble strong { font-weight: 600; color: #ccc; }

    /* Typing */
    .typing-row { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 24px; }
    .typing-bubble {
      display: flex; align-items: center; gap: 4px;
      padding: 12px 16px; background: var(--surface);
      border: 1px solid var(--border); border-left: 2px solid var(--accent);
      border-radius: 8px; border-bottom-left-radius: 3px;
    }
    .typing-bubble span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted); animation: tdot 1.1s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .18s; }
    .typing-bubble span:nth-child(3) { animation-delay: .36s; }
    @keyframes tdot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

    /* Input */
    .input-area {
      padding: 16px 28px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--border-h); }

    textarea {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 14px; resize: none; min-height: 22px; max-height: 140px; line-height: 1.5;
    }
    textarea::placeholder { color: var(--muted-2); }

    .send-btn {
      width: 32px; height: 32px; border-radius: 6px; border: none;
      background: var(--accent); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .15s, transform .1s;
    }
    .send-btn:hover { opacity: .85; }
    .send-btn:active { transform: scale(.93); }
    .send-btn:disabled { opacity: .3; cursor: not-allowed; }
    .send-btn svg { fill: #fff; }

    .input-hint { font-size: 11px; color: var(--muted-2); margin-top: 8px; text-align: center; }

    /* ─── Responsive ─── */
    @media (max-width: 700px) {
      .bot-grid { grid-template-columns: 1fr; max-width: 400px; }
      .home-h1 { font-size: 24px; }
      .messages { padding: 20px 16px; }
      .chat-header { padding: 0 16px; }
      .input-area { padding: 12px 16px 16px; }
      .msg-bubble { max-width: 88%; }
      .home-header { padding: 20px 20px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════
     HOME VIEW
═══════════════════════════════════ -->
<div id="viewHome">
  <header class="home-header">
    <div class="home-logo">AI</div>
    <span class="home-title">Daily Assistenten</span>
  </header>
  <main class="home-main">
    <p class="home-headline">Persönliche KI-Assistenten</p>
    <h1 class="home-h1">Drei Charaktere.<br>Ein Ziel.</h1>
    <p class="home-sub">Wähle den Assistenten, der zu deiner aktuellen Situation passt. Jeder verfolgt einen anderen Ansatz, um dich täglich weiterzubringen.</p>
    <div class="bot-grid" id="botGrid"></div>
  </main>
</div>

<!-- ═══════════════════════════════════
     CHAT VIEW
═══════════════════════════════════ -->
<div id="viewChat" class="hidden">
  <header class="chat-header">
    <button class="back-btn" onclick="goHome()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Übersicht
    </button>
    <div class="chat-bot-info">
      <div class="bot-badge" id="chatBadge"></div>
      <span class="chat-bot-name" id="chatName"></span>
      <span class="chat-bot-tag" id="chatTag"></span>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>Aktiv</span>
    </div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Nachricht eingeben…" rows="1"
        onkeydown="handleKey(event)" oninput="grow(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">
        <svg width="14" height="14" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="input-hint">Enter senden &nbsp;·&nbsp; Shift+Enter Zeilenumbruch</p>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   BOT DEFINITIONS
══════════════════════════════════════ */
const BOTS = [
  {
    id: 'zielstrebig',
    name: 'Zielstrebig',
    tag: 'Performance',
    icon: '↑',
    accent: '#c2830a',
    desc: 'Direkt und fordernd. Hält dich konsequent auf Kurs und lässt keine Ausreden gelten.',
    traits: ['Direkt', 'Fordernd', 'Strukturiert'],
    starters: [
      'Was sind meine Top-3-Prioritäten heute?',
      'Ich prokrastiniere bei einer Aufgabe — hilf mir.',
      'Erstelle mir einen fokussierten Tagesplan.',
    ],
    system: `Du bist ein hochperformanter persönlicher Coach mit der Mentalität eines Spitzensportlers. Du bist direkt, präzise und duldest keine Ausreden.

Deine Aufgabe:
- Den Nutzer zu Höchstleistungen antreiben
- Prokrastination sofort identifizieren und durchbrechen
- Klare, umsetzbare Aktionspläne erstellen
- Konsequente Rechenschaft einfordern

Dein Stil: Kurz. Klar. Fordernd aber fair. Komm sofort zum Punkt. Wenn der Nutzer Ausreden nennt, weise direkt darauf hin. Strukturiere Antworten mit klaren nächsten Schritten. Keine langen Einleitungen.

Antworte auf Deutsch. Maximal prägnant.`
  },
  {
    id: 'wohltuend',
    name: 'Wohltuend',
    tag: 'Fürsorge',
    icon: '◯',
    accent: '#0d7a5f',
    desc: 'Einfühlsam und unterstützend. Motiviert mit Verständnis und ganzheitlichem Blick.',
    traits: ['Empathisch', 'Motivierend', 'Ausgewogen'],
    starters: [
      'Ich fühle mich heute überfordert.',
      'Wie finde ich mehr Energie für meine Aufgaben?',
      'Hilf mir, meinen Tag stressfrei zu starten.',
    ],
    system: `Du bist ein einfühlsamer persönlicher Assistent und Life-Coach. Du erkennst emotionale Zustände und schaffst einen sicheren, unterstützenden Raum.

Deine Stärken:
- Mitgefühl und echtes Verständnis zeigen
- Unterstützung mit sanfter Motivation balancieren
- Erschöpfung erkennen und bei Regeneration helfen
- Fortschritte feiern, auch kleine
- Auf Ziele hinarbeiten mit ganzheitlichem Blick auf Wohlbefinden

Dein Stil: Warm, aufmerksam, menschlich. Du fragst nach dem Befinden. Du gibst praktische Hilfe, ohne die Person zu überfordern. Du feierst Schritte in die richtige Richtung.

Antworte auf Deutsch. Warm und authentisch.`
  },
  {
    id: 'nonlinear',
    name: 'Nonlinear',
    tag: 'Perspektiven',
    icon: '◇',
    accent: '#6d28d9',
    desc: 'Kreativ und unkonventionell. Stellt Grundannahmen in Frage und öffnet neue Denkräume.',
    traits: ['Kreativ', 'Provokativ', 'Systemisch'],
    starters: [
      'Was übersehe ich bei meinem aktuellen Problem?',
      'Stelle meine heutigen Pläne in Frage.',
      'Welche versteckten Annahmen halte ich für wahr?',
    ],
    system: `Du bist ein kreativer Querdenker und Systemdenker. Deine Superkraft: Du erkennst Muster die andere übersehen, stellst Grundannahmen in Frage und bietest unerwartete Perspektiven.

Du denkst in: Systemen, Loops, Paradoxien, First Principles, indirekten Effekten.

Deine Methoden:
- Mit einer unerwarteten Gegenfrage starten
- Annahmen explizit benennen und hinterfragen
- Abstrakte Muster auf konkrete Situationen anwenden
- Mehrere widersprüchliche Perspektiven gleichzeitig halten
- Konventionelle Lösungen auf den Kopf stellen

Dein Stil: Intellektuell stimulierend. Manchmal provokativ. Immer erhellend. Hilf dem Nutzer, aus eingefahrenen Denkmustern auszubrechen.

Antworte auf Deutsch. Unkonventionell aber präzise.`
  }
];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let currentBot = null;
let histories  = {};  // per-bot message history
let busy       = false;

BOTS.forEach(b => { histories[b.id] = []; });

/* ══════════════════════════════════════
   INIT — render cards
══════════════════════════════════════ */
(function initCards() {
  const grid = document.getElementById('botGrid');
  BOTS.forEach((bot, i) => {
    const card = document.createElement('div');
    card.className = 'bot-card';
    card.style.setProperty('--accent', bot.accent);
    card.onclick = () => openBot(i);
    card.innerHTML = `
      <div class="card-icon">${bot.icon}</div>
      <div class="card-name">${bot.name}</div>
      <div class="card-desc">${bot.desc}</div>
      <div class="card-traits">${bot.traits.map(t => `<span class="trait">${t}</span>`).join('')}</div>
      <span class="card-cta">Gespräch starten →</span>
    `;
    grid.appendChild(card);
  });
})();

/* ══════════════════════════════════════
   NAVIGATION
══════════════════════════════════════ */
function openBot(idx) {
  currentBot = BOTS[idx];
  document.documentElement.style.setProperty('--accent', currentBot.accent);

  document.getElementById('chatBadge').textContent = currentBot.icon;
  document.getElementById('chatBadge').style.background = currentBot.accent;
  document.getElementById('chatName').textContent = currentBot.name;
  document.getElementById('chatTag').textContent = currentBot.tag;

  document.getElementById('viewHome').classList.add('hidden');
  document.getElementById('viewChat').classList.remove('hidden');

  renderMessages();
  document.getElementById('input').focus();
}

function goHome() {
  document.getElementById('viewChat').classList.add('hidden');
  document.getElementById('viewHome').classList.remove('hidden');
  currentBot = null;
}

/* ══════════════════════════════════════
   RENDER MESSAGES
══════════════════════════════════════ */
function renderMessages() {
  const el = document.getElementById('messages');
  el.innerHTML = '';
  const hist = histories[currentBot.id];

  if (hist.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'emptyState';
    empty.innerHTML = `
      <div class="empty-icon" style="background:${currentBot.accent}">${currentBot.icon}</div>
      <h3>${currentBot.name}</h3>
      <p>${currentBot.desc}</p>
      <div class="starter-chips">
        ${currentBot.starters.map(s => `<div class="starter-chip" onclick="useStarter(this)">${s}</div>`).join('')}
      </div>
    `;
    el.appendChild(empty);
    return;
  }

  hist.forEach(msg => addBubbleToDom(msg.role === 'user' ? 'user' : 'ai', fmtText(msg.content)));
  scrollBottom();
}

/* ══════════════════════════════════════
   DOM HELPERS
══════════════════════════════════════ */
function addBubbleToDom(role, html, returnBubble = false) {
  document.getElementById('emptyState')?.remove();
  const el = document.getElementById('messages');

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = role === 'user' ? 'Du' : currentBot.name;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.style.setProperty('--accent', currentBot.accent);
  bubble.innerHTML = html;

  row.appendChild(sender);
  row.appendChild(bubble);
  el.appendChild(row);
  scrollBottom();
  return returnBubble ? bubble : null;
}

function showTyping() {
  document.getElementById('emptyState')?.remove();
  const el = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingRow';

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = currentBot.name;

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.style.setProperty('--accent', currentBot.accent);
  bubble.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(sender);
  row.appendChild(bubble);
  el.appendChild(row);
  scrollBottom();
}
function hideTyping() { document.getElementById('typingRow')?.remove(); }
function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

/* ══════════════════════════════════════
   TEXT FORMATTING
══════════════════════════════════════ */
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtText(text) {
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g,
    (_, lang, code) => `<pre><code>${esc(code.trim())}</code></pre>`);
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

/* ══════════════════════════════════════
   INPUT HANDLERS
══════════════════════════════════════ */
function grow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function useStarter(el) {
  document.getElementById('input').value = el.textContent;
  send();
}

/* ══════════════════════════════════════
   SEND MESSAGE
══════════════════════════════════════ */
async function send() {
  if (busy || !currentBot) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  busy = true;

  const hist = histories[currentBot.id];
  hist.push({ role: 'user', content: text });
  addBubbleToDom('user', fmtText(text));
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: hist, system: currentBot.system })
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Fehler ${res.status}: ${errText}`);
    }

    hideTyping();

    // Create bubble, stream into it
    const row = document.createElement('div');
    row.className = 'msg-row ai';

    const sender = document.createElement('div');
    sender.className = 'msg-sender';
    sender.textContent = currentBot.name;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.style.setProperty('--accent', currentBot.accent);

    row.appendChild(sender);
    row.appendChild(bubble);
    document.getElementById('messages').appendChild(row);

    let full = '';
    const reader = res.body.getReader();
    const dec = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = dec.decode(value).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const obj = JSON.parse(raw);
          if (obj.type === 'content_block_delta' && obj.delta?.type === 'text_delta') {
            full += obj.delta.text;
            bubble.innerHTML = fmtText(full);
            scrollBottom();
          }
        } catch (_) {}
      }
    }

    if (full) hist.push({ role: 'assistant', content: full });

  } catch (err) {
    hideTyping();
    addBubbleToDom('ai',
      `<strong>Fehler:</strong> ${esc(err.message)}<br><small style="color:#666">Stelle sicher, dass <code>ANTHROPIC_API_KEY</code> in den Vercel Umgebungsvariablen gesetzt ist.</small>`
    );
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
}
</script>
