<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problemlösung — KI-Diskussion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface-h: #161616;
      --border:    rgba(255,255,255,0.09);
      --border-h:  rgba(255,255,255,0.16);
      --text:      #e4e4e4;
      --muted:     #5a5a5a;
      --muted-2:   #383838;
      --col-an:    #3b82f6;
      --col-sd:    #10b981;
      --col-pv:    #d97706;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .hidden { display: none !important; }

    /* ─────────────────────────────
       SHARED HEADER
    ───────────────────────────── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 36px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--text);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--bg);
      letter-spacing: -.02em;
    }
    .page-header-title { font-size: 14px; font-weight: 500; }

    /* ─────────────────────────────
       INPUT VIEW
    ───────────────────────────── */
    #viewInput { min-height: 100vh; display: flex; flex-direction: column; }

    .input-main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 56px 24px;
    }

    .input-wrap {
      width: 100%; max-width: 640px;
      display: flex; flex-direction: column; gap: 0;
    }

    .input-eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
    }

    .input-h1 {
      font-size: 28px; font-weight: 600; letter-spacing: -.03em;
      line-height: 1.28; margin-bottom: 10px;
    }

    .input-sub {
      font-size: 14px; color: var(--muted); line-height: 1.65;
      margin-bottom: 32px; max-width: 500px;
    }

    .problem-area {
      width: 100%; min-height: 130px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 14px; line-height: 1.7; resize: vertical;
      outline: none; transition: border-color .2s;
    }
    .problem-area::placeholder { color: var(--muted-2); }
    .problem-area:focus { border-color: var(--border-h); }

    .start-btn {
      margin-top: 12px; width: 100%; padding: 13px 24px;
      background: var(--text); color: var(--bg); border: none;
      border-radius: 8px; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
      letter-spacing: -.01em; transition: opacity .15s, transform .1s;
    }
    .start-btn:hover { opacity: .88; }
    .start-btn:active { transform: scale(.98); }
    .start-btn:disabled { opacity: .35; cursor: not-allowed; }

    .agents-preview {
      display: flex; align-items: center; gap: 14px;
      margin-top: 28px; justify-content: center; flex-wrap: wrap;
    }
    .agent-pre {
      display: flex; align-items: center; gap: 7px;
    }
    .agent-pip {
      width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: #fff;
    }
    .agent-pre-name { font-size: 12px; color: var(--muted); }
    .agents-dot { font-size: 10px; color: var(--muted-2); }

    /* ─────────────────────────────
       DISCUSSION VIEW
    ───────────────────────────── */
    #viewDiscussion { height: 100vh; display: flex; flex-direction: column; }

    .disc-header {
      display: flex; align-items: center; gap: 14px;
      padding: 0 28px; height: 56px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; color: var(--muted);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; background: none; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color .15s, border-color .15s; flex-shrink: 0;
    }
    .back-btn:hover { color: var(--text); border-color: var(--border-h); }

    .disc-problem-label {
      flex: 1; min-width: 0;
      font-size: 13px; color: var(--muted);
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    .round-badge {
      flex-shrink: 0; font-size: 11px; font-weight: 500;
      color: var(--muted); background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 9px; letter-spacing: .04em;
    }

    /* ─────────────────────────────
       MESSAGES AREA
    ───────────────────────────── */
    .disc-messages {
      flex: 1; overflow-y: auto; padding: 28px;
      display: flex; flex-direction: column; gap: 0;
      scrollbar-width: thin; scrollbar-color: #1a1a1a transparent;
    }
    .disc-messages::-webkit-scrollbar { width: 3px; }
    .disc-messages::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 4px; }

    /* Round separator */
    .round-sep {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 22px;
    }
    .round-sep:first-child { margin-top: 0; }
    .sep-line { flex: 1; height: 1px; background: var(--border); }
    .sep-label {
      font-size: 10px; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); white-space: nowrap;
    }

    /* Synthesis separator — slightly brighter */
    .synth-sep .sep-line  { background: rgba(255,255,255,0.14); }
    .synth-sep .sep-label { color: #888; }

    /* Agent message */
    .agent-wrap {
      display: flex; flex-direction: column;
      margin-bottom: 20px;
      animation: fUp .22s ease;
    }
    @keyframes fUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .agent-header {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 7px; padding-left: 2px;
    }
    .agent-bdg {
      width: 24px; height: 24px; border-radius: 5px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700; color: #fff; letter-spacing: .01em;
    }
    .agent-nm  { font-size: 12px; font-weight: 600; letter-spacing: -.01em; }
    .agent-sub { font-size: 11px; color: var(--muted); }

    .agent-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--ac);
      border-radius: 8px;
      border-bottom-left-radius: 3px;
      padding: 12px 16px;
      font-size: 14px; line-height: 1.78;
    }

    /* Synthesis bubble — slightly elevated */
    .synth-bubble {
      background: #141414;
      border-color: rgba(255,255,255,0.13);
    }

    /* Typing indicator */
    .typing-wrap {
      display: flex; flex-direction: column;
      margin-bottom: 20px;
    }
    .typing-dots {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 12px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-left: 2px solid var(--ac);
      border-radius: 8px; border-bottom-left-radius: 3px;
    }
    .typing-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted); animation: td 1.1s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .18s; }
    .typing-dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes td { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* Done state */
    .done-block {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 28px 0 12px;
      border-top: 1px solid var(--border); margin-top: 10px;
    }
    .done-pill {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--muted);
    }
    .done-check {
      width: 16px; height: 16px; border-radius: 50%;
      background: #16a34a; display: flex; align-items: center;
      justify-content: center; font-size: 9px; color: #fff;
    }
    .restart-btn {
      padding: 9px 18px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      transition: border-color .15s, background .15s;
    }
    .restart-btn:hover { border-color: var(--border-h); background: var(--surface-h); }

    /* Error block */
    .error-block {
      padding: 14px 16px; margin: 10px 0;
      background: #130a0a; border: 1px solid #2e1515;
      border-radius: 8px; font-size: 13px; color: #f87171;
    }
    .error-block small { display: block; margin-top: 6px; color: var(--muted); }

    /* Code in bubbles */
    .agent-bubble pre {
      background: rgba(0,0,0,.4); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px; margin: 10px 0;
      overflow-x: auto;
    }
    .agent-bubble pre code { font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 12px; line-height: 1.6; }
    .agent-bubble code {
      font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 12px;
      background: rgba(255,255,255,.06); padding: 1px 5px; border-radius: 4px;
    }
    .agent-bubble pre code { background: none; padding: 0; }
    .agent-bubble strong { font-weight: 600; color: #ccc; }

    @media (max-width: 600px) {
      .page-header   { padding: 18px 18px; }
      .disc-header   { padding: 0 14px; }
      .disc-messages { padding: 18px 14px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     INPUT VIEW
══════════════════════════════════ -->
<div id="viewInput">
  <header class="page-header">
    <div class="logo">KI</div>
    <span class="page-header-title">Problemlösung</span>
  </header>
  <div class="input-main">
    <div class="input-wrap">
      <p class="input-eyebrow">Multi-Agenten-Diskussion</p>
      <h1 class="input-h1">Was möchtest du lösen?</h1>
      <p class="input-sub">Drei spezialisierte KI-Agenten analysieren dein Anliegen, diskutieren es aus verschiedenen Perspektiven und erarbeiten gemeinsam eine Lösung.</p>
      <textarea
        id="problemInput"
        class="problem-area"
        placeholder="Beschreibe dein Problem, dein Ziel oder deine Herausforderung…"
        onkeydown="handleKey(event)"
      ></textarea>
      <button class="start-btn" id="startBtn" onclick="startDiscussion()">Diskussion starten →</button>
      <div class="agents-preview">
        <div class="agent-pre">
          <div class="agent-pip" style="background:var(--col-an)">AN</div>
          <span class="agent-pre-name">Analyst</span>
        </div>
        <span class="agents-dot">·</span>
        <div class="agent-pre">
          <div class="agent-pip" style="background:var(--col-sd)">SD</div>
          <span class="agent-pre-name">Systemdenker</span>
        </div>
        <span class="agents-dot">·</span>
        <div class="agent-pre">
          <div class="agent-pip" style="background:var(--col-pv)">PV</div>
          <span class="agent-pre-name">Provokateur</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     DISCUSSION VIEW
══════════════════════════════════ -->
<div id="viewDiscussion" class="hidden">
  <header class="disc-header">
    <button class="back-btn" onclick="resetToInput()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Neu
    </button>
    <span class="disc-problem-label" id="problemLabel"></span>
    <span class="round-badge" id="roundBadge">Runde 1 / 4</span>
  </header>
  <div class="disc-messages" id="discMessages"></div>
</div>

<script>
/* ══════════════════════════════════════
   AGENTS
══════════════════════════════════════ */
const AGENTS = [
  {
    id: 'analyst', badge: 'AN', name: 'Analyst',
    sub: 'Systemanalytik · Logik · Struktur',
    color: '#3b82f6',
    system: `Du bist ANALYST in einer KI-Problemlösungs-Diskussion mit zwei weiteren Agenten: SYSTEMDENKER (ganzheitlich, vernetzend) und PROVOKATEUR (kritisch, hinterfragend).

Dein Hintergrund: Systemanalytik, strukturiertes Denken, Kausalanalyse, klare Priorisierung.

Aufgabe je nach Runde:
— Erstanalyse: Zerlege das Problem in Kernkomponenten, benenne klare Kausalitäten.
— Vertiefung: Reagiere präzise auf spezifische Punkte der anderen. Schärfe oder widerlege.
— Konvergenz: Synthetisiere die stärksten logischen Einsichten der bisherigen Diskussion.
— Synthese: Formuliere konkrete, strukturierte, priorisierte Handlungsschritte.

Stil: Präzise. Direkt. Sachlich. Keine Einleitungsfloskeln. Maximal 130 Wörter. Deutsch.`
  },
  {
    id: 'systemdenker', badge: 'SD', name: 'Systemdenker',
    sub: 'Emergenz · Muster · Wechselwirkungen',
    color: '#10b981',
    system: `Du bist SYSTEMDENKER in einer KI-Problemlösungs-Diskussion mit zwei weiteren Agenten: ANALYST (logisch, strukturiert) und PROVOKATEUR (kritisch, hinterfragend).

Dein Hintergrund: Systemisches Denken, Emergenz, Feedback-Loops, Mustererkennung, unbeabsichtigte Wechselwirkungen.

Aufgabe je nach Runde:
— Erstanalyse: Erkenne systemische Muster, Feedback-Loops und übergeordnete Zusammenhänge.
— Vertiefung: Verbinde die Punkte von Analyst und Provokateur auf einer höheren Abstraktionsebene.
— Konvergenz: Zeige wie sich die Diskussionsperspektiven zu einem kohärenten Systembild fügen.
— Synthese: Formuliere Empfehlungen die systemische Risiken und unbeabsichtigte Effekte berücksichtigen.

Stil: Holistisch. Vernetzend. Tiefgründig. Kein Metakommentar. Maximal 130 Wörter. Deutsch.`
  },
  {
    id: 'provokateur', badge: 'PV', name: 'Provokateur',
    sub: 'First Principles · Blinde Flecken',
    color: '#d97706',
    system: `Du bist PROVOKATEUR in einer KI-Problemlösungs-Diskussion mit zwei weiteren Agenten: ANALYST (logisch) und SYSTEMDENKER (holistisch).

Dein Hintergrund: First-Principles-Denken, strategisches Hinterfragen, Erkennung von blinden Flecken und versteckten Annahmen.

Aufgabe je nach Runde:
— Erstanalyse: Identifiziere die wichtigste ungeprüfte Grundannahme im Problem.
— Vertiefung: Benenne blinde Flecken in den Beiträgen der anderen. Was übersehen sie?
— Konvergenz: Prüfe ob die entstehende Lösung wirklich das Kernproblem adressiert oder nur Symptome.
— Synthese: Benenne die eine kritische Voraussetzung, ohne die die Lösung scheitert.

Stil: Direkt. Provokativ aber konstruktiv. Maximal 130 Wörter. Deutsch.`
  }
];

const ROUNDS = [
  { label: 'Erstanalyse', prompt: 'Analysiere das Problem oder Ziel aus deiner spezifischen Perspektive. Sei präzise.' },
  { label: 'Vertiefung',  prompt: 'Baue direkt auf den Beiträgen der anderen auf. Reagiere auf konkrete Punkte. Vertiefe, ergänze, widersprich wo nötig.' },
  { label: 'Konvergenz',  prompt: 'Die Diskussion nimmt Form an. Identifiziere die zwei, drei stärksten Erkenntnisse. Wo zeigt sich Einigkeit, was bleibt offen?' },
  { label: 'Synthese',    prompt: 'FINALE RUNDE. Formuliere deinen konkreten, umsetzbaren Beitrag zur Gesamtlösung. Klar und prägnant, ohne Wiederholungen.' },
];

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let problem = '';
let discussionHistory = [];
let isRunning = false;

/* ══════════════════════════════════════
   NAVIGATION
══════════════════════════════════════ */
function handleKey(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    startDiscussion();
  }
}

function resetToInput() {
  if (isRunning) return;
  document.getElementById('viewDiscussion').classList.add('hidden');
  document.getElementById('viewInput').classList.remove('hidden');
  document.getElementById('discMessages').innerHTML = '';
  document.getElementById('problemInput').value = '';
  discussionHistory = [];
  problem = '';
}

/* ══════════════════════════════════════
   ORCHESTRATION
══════════════════════════════════════ */
async function startDiscussion() {
  problem = document.getElementById('problemInput').value.trim();
  if (!problem || isRunning) return;

  isRunning = true;
  document.getElementById('startBtn').disabled = true;

  document.getElementById('viewInput').classList.add('hidden');
  document.getElementById('viewDiscussion').classList.remove('hidden');
  document.getElementById('discMessages').innerHTML = '';

  const preview = problem.length > 72 ? problem.slice(0, 69) + '…' : problem;
  document.getElementById('problemLabel').textContent = preview;
  updateRoundBadge(1);

  try {
    for (let ri = 0; ri < ROUNDS.length; ri++) {
      updateRoundBadge(ri + 1);
      appendSep(ri + 1, ROUNDS[ri].label, ri === ROUNDS.length - 1);
      for (const agent of AGENTS) {
        await callAgent(agent, ROUNDS[ri].prompt, ri === ROUNDS.length - 1);
      }
    }
    appendDone();
  } catch (err) {
    appendError(err.message);
  }

  isRunning = false;
  document.getElementById('startBtn').disabled = false;
}

/* ══════════════════════════════════════
   API CALL + STREAMING
══════════════════════════════════════ */
async function callAgent(agent, roundPrompt, isSynth) {
  const histText = discussionHistory
    .map(m => `[${m.agentName.toUpperCase()}]: ${m.content}`)
    .join('\n\n');

  const userContent = discussionHistory.length === 0
    ? `Problem/Ziel: "${problem}"\n\nAufgabe: ${roundPrompt}`
    : `Problem/Ziel: "${problem}"\n\nDiskussion bisher:\n\n${histText}\n\n---\n\nAufgabe für diese Runde: ${roundPrompt}`;

  const typingEl = appendTyping(agent);

  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: 'user', content: userContent }],
      system: agent.system,
      maxTokens: isSynth ? 700 : 450
    })
  });

  typingEl.remove();

  if (!res.ok) throw new Error(`API Fehler ${res.status}: ${await res.text()}`);

  const bubble = appendAgentBubble(agent, isSynth);
  let full = '';

  const reader = res.body.getReader();
  const dec = new TextDecoder();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (const line of dec.decode(value).split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') continue;
      try {
        const obj = JSON.parse(raw);
        if (obj.type === 'content_block_delta' && obj.delta?.type === 'text_delta') {
          full += obj.delta.text;
          bubble.innerHTML = fmt(full);
          scroll();
        }
      } catch (_) {}
    }
  }

  if (full) discussionHistory.push({ agentId: agent.id, agentName: agent.name, content: full });
}

/* ══════════════════════════════════════
   DOM BUILDERS
══════════════════════════════════════ */
const el = id => document.getElementById(id);

function appendSep(num, label, isSynth) {
  const div = document.createElement('div');
  div.className = `round-sep${isSynth ? ' synth-sep' : ''}`;
  div.innerHTML = `
    <div class="sep-line"></div>
    <span class="sep-label">${isSynth ? 'Synthese' : `Runde ${num} — ${label}`}</span>
    <div class="sep-line"></div>
  `;
  el('discMessages').appendChild(div);
  scroll();
}

function appendTyping(agent) {
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';

  const hdr = document.createElement('div');
  hdr.className = 'agent-header';
  hdr.innerHTML = `
    <div class="agent-bdg" style="background:${agent.color}">${agent.badge}</div>
    <span class="agent-nm" style="color:${agent.color}">${agent.name}</span>
  `;

  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.style.setProperty('--ac', agent.color);
  dots.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(hdr);
  wrap.appendChild(dots);
  el('discMessages').appendChild(wrap);
  scroll();
  return wrap;
}

function appendAgentBubble(agent, isSynth) {
  const wrap = document.createElement('div');
  wrap.className = 'agent-wrap';

  const hdr = document.createElement('div');
  hdr.className = 'agent-header';
  hdr.innerHTML = `
    <div class="agent-bdg" style="background:${agent.color}">${agent.badge}</div>
    <span class="agent-nm" style="color:${agent.color}">${agent.name}</span>
    <span class="agent-sub">${agent.sub}</span>
  `;

  const bubble = document.createElement('div');
  bubble.className = `agent-bubble${isSynth ? ' synth-bubble' : ''}`;
  bubble.style.setProperty('--ac', agent.color);

  wrap.appendChild(hdr);
  wrap.appendChild(bubble);
  el('discMessages').appendChild(wrap);
  scroll();
  return bubble;
}

function appendDone() {
  const div = document.createElement('div');
  div.className = 'done-block';
  div.innerHTML = `
    <div class="done-pill">
      <div class="done-check">✓</div>
      Diskussion abgeschlossen
    </div>
    <button class="restart-btn" onclick="resetToInput()">Neue Diskussion starten →</button>
  `;
  el('discMessages').appendChild(div);
  scroll();
}

function appendError(msg) {
  const div = document.createElement('div');
  div.className = 'error-block';
  div.innerHTML = `<strong>Fehler:</strong> ${esc(msg)}<small>Stelle sicher, dass ANTHROPIC_API_KEY in Vercel gesetzt ist.</small>`;
  el('discMessages').appendChild(div);

  const btn = document.createElement('button');
  btn.className = 'restart-btn';
  btn.style.marginTop = '8px';
  btn.textContent = '← Zurück';
  btn.onclick = resetToInput;
  el('discMessages').appendChild(btn);
  scroll();
}

function updateRoundBadge(n) {
  el('roundBadge').textContent = `Runde ${n} / ${ROUNDS.length}`;
}

function scroll() {
  const m = el('discMessages');
  m.scrollTop = m.scrollHeight;
}

/* ══════════════════════════════════════
   TEXT FORMAT
══════════════════════════════════════ */
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(text) {
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g,
    (_, _l, code) => `<pre><code>${esc(code.trim())}</code></pre>`);
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}
